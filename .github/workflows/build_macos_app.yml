name: Build macOS app bundle

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - 'bleachbit/**'
      - 'cleaners/**'
      - 'requirements.txt'
      - '.github/workflows/build_macos_app.yml'

jobs:
  build-macos-app:
    runs-on: macos-14
    timeout-minutes: 45

    env:
      MACOSX_DEPLOYMENT_TARGET: '13.0'
      BUNDLE_ID: 'org.bleachbit.BleachBit'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # PyInstaller 6.19.0 regresses macOS bundle assembly with nested data
          # directories (fails in BUNDLE step creating Contents/Frameworks/...).
          # Pin to a known-good release for deterministic CI builds.
          pip install -r requirements.txt "pyinstaller==6.16.0"

      - name: Generate Revision.py
        run: |
          echo "revision = \"$(git rev-parse --short HEAD)\"" > bleachbit/Revision.py
          echo "build_number = \"${{ github.run_number }}\"" >> bleachbit/Revision.py

      - name: Generate local translations
        run: make -C po local

      - name: Build .app bundle with PyInstaller
        run: |
          # PyInstaller can fail during macOS BUNDLE assembly when packaging
          # nested directories that contain relative symlinks. Flatten the
          # theme tree into regular files before passing it via --add-data.
          rm -rf themes_pyinstaller
          cp -RL themes themes_pyinstaller
          mkdir -p icon.iconset
          sips -z 16 16 bleachbit.png --out icon.iconset/icon_16x16.png
          sips -z 32 32 bleachbit.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32 bleachbit.png --out icon.iconset/icon_32x32.png
          sips -z 64 64 bleachbit.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 bleachbit.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 bleachbit.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 bleachbit.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 bleachbit.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512 bleachbit.png --out icon.iconset/icon_512x512.png
          cp bleachbit.png icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o bleachbit.icns
          pyinstaller --noconfirm --clean --windowed \
            --name BleachBit \
            --osx-bundle-identifier "$BUNDLE_ID" \
            --icon bleachbit.icns \
            --add-data "bleachbit.png:." \
            --add-data "cleaners:cleaners" \
            --add-data "themes_pyinstaller:themes" \
            --add-data "po:po" \
            --add-data "locale:locale" \
            bleachbit.py

      - name: Zip app artifact
        run: |
          cd dist
          ditto -c -k --keepParent BleachBit.app BleachBit-macos-universal.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BleachBit-macos-app
          path: dist/BleachBit-macos-universal.zip
          if-no-files-found: error
